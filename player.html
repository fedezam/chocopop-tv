<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Player</title>
<style>body{margin:0;background:#000;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;height:100vh}#p{flex:1;border:none;width:100%}.c{padding:10px;background:#111;display:flex;justify-content:space-between;align-items:center}.b{background:#e50914;color:#fff;border:none;padding:10px 20px;border-radius:4px;cursor:pointer}</style></head>
<body><div class="c"><span id="t">Cargando...</span><button class="b" onclick="history.back()">← Volver</button></div><iframe id="p" allowfullscreen allow="autoplay;encrypted-media"></iframe><script>const p=new URLSearchParams(location.search);document.getElementById('t').textContent=p.get('title')||'Player';if(p.get('url'))document.getElementById('p').src=p.get('url');</script></body></html>
