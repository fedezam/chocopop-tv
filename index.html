<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChocoPop TV</title>
  <style>
    :root { --bg:#0f0f0f; --card:#1a1a1a; --text:#f5f5f5; --accent:#e50914; }
    body { background:var(--bg); color:var(--text); font-family:system-ui, -apple-system, sans-serif; margin:0; padding:12px; }
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .header h2 { margin:0; font-size:20px; }
    .tabs { display:flex; gap:8px; overflow-x:auto; padding:5px 0; margin-bottom:12px; }
    .tab { background:#2a2a2a; color:#aaa; border:none; padding:8px 14px; border-radius:18px; cursor:pointer; white-space:nowrap; font-size:14px; }
    .tab.active { background:var(--accent); color:#fff; }
    .search { width:100%; padding:12px; background:#222; border:1px solid #333; color:#fff; border-radius:8px; font-size:15px; margin-bottom:15px; box-sizing:border-box; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:12px; }
    .card { background:var(--card); border-radius:8px; overflow:hidden; cursor:pointer; outline:none; transition:transform .2s; }
    .card:hover, .card:focus { transform:scale(1.02); outline:3px solid var(--accent); }
    .poster { width:100%; height:240px; object-fit:cover; background:#151515; display:block; }
    .poster.missing { background:linear-gradient(135deg,#151515,#222); display:flex; align-items:center; justify-content:center; color:#555; font-size:32px; }
    .title { padding:8px 10px; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .status { text-align:center; color:#666; padding:30px; font-size:14px; }
  </style>
</head>
<body>
  <div class="header"><h2>🍫 ChocoPop TV</h2><small id="date">...</small></div>
  <div class="tabs">
    <button class="tab active" data-filter="all" onclick="setFilter('all')">Todos</button>
    <button class="tab" data-filter="pelicula" onclick="setFilter('pelicula')">🎬 Pelis</button>
    <button class="tab" data-filter="serie" onclick="setFilter('serie')">📺 Series</button>
    <button class="tab" data-filter="evento" onclick="setFilter('evento')">⚽ Eventos</button>
  </div>
  <input type="text" class="search" id="q" placeholder="🔍 Buscar título..." autofocus>
  <div id="grid" class="grid"></div>
  <div id="status" class="status">Cargando catálogo...</div>

  <script>
    const REPO = "fedezam/chocopop-tv";
    const JSON_URL = `https://raw.githubusercontent.com/${REPO}/main/data/tvbox_index.json`;
    let allItems = [], currentFilter = 'all';

    async function load() {
      try {
        const res = await fetch(`${JSON_URL}?v=${Date.now()}`);
        if (!res.ok) throw new Error('No se pudo conectar a GitHub');
        const data = await res.json();
        allItems = data.items || [];
        if (data.updated) {
          const d = new Date(data.updated);
          document.getElementById('date').textContent = `🕐 ${d.toLocaleDateString()}`;
        }
        render();
        document.getElementById('status').textContent = allItems.length ? `${allItems.length} títulos listos` : 'Catálogo vacío';
      } catch (e) {
        document.getElementById('status').textContent = `❌ ${e.message}`;
      }
    }

    function setFilter(type) {
      currentFilter = type;
      document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.filter === type));
      render();
    }

    function render() {
      const q = document.getElementById('q').value.toLowerCase();
      const filtered = allItems.filter(i => {
        const matchType = currentFilter === 'all' || i.type === currentFilter;
        const matchQ = !q || i.title.toLowerCase().includes(q);
        return matchType && matchQ;
      });

      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      if (!filtered.length) { grid.innerHTML = '<div class="status">Sin resultados</div>'; return; }

      filtered.forEach(i => {
        const card = document.createElement('div');
        card.className = 'card'; card.tabIndex = 0;
        card.onclick = () => openPlayer(i);
        card.onkeydown = e => { if(e.key==='Enter') openPlayer(i); };

        const img = document.createElement('img');
        img.className = 'poster'; img.loading = 'lazy';
        if (i.poster) {
          img.src = i.poster;
          img.onerror = () => { img.classList.add('missing'); img.src=''; img.alt='🎞️'; };
        } else {
          img.classList.add('missing'); img.alt='🎞️';
        }

        const title = document.createElement('div');
        title.className = 'title';
        title.textContent = i.title + (i.year ? ` (${i.year})` : '');

        card.append(img, title);
        grid.appendChild(card);
      });
    }

    function openPlayer(item) {
      if (!item.stream) return alert('⚠️ Sin stream disponible');
      window.location.href = `player.html?url=${encodeURIComponent(item.stream)}&title=${encodeURIComponent(item.title)}`;
    }

    document.getElementById('q').addEventListener('input', render);
    load();
  </script>
</body>
</html>
