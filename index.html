<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ChocoPop TV</title>
<style>body{background:#111;color:#fff;font-family:sans-serif;margin:0;padding:10px}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}.card{background:#222;border-radius:8px;overflow:hidden;cursor:pointer;outline:none}.card:focus{outline:3px solid #e50914}.card img{width:100%;height:225px;object-fit:cover;background:#333}.card .title{padding:8px;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.search{width:100%;padding:12px;margin-bottom:15px;background:#222;border:1px solid #444;color:#fff;border-radius:6px;font-size:16px}.status{font-size:12px;color:#888;text-align:center;margin:10px 0}</style></head>
<body><div class="header"><h2>🍫 ChocoPop TV</h2><small id="last-update">...</small></div><input type="text" class="search" id="search" placeholder="🔍 Buscar..."><div id="status" class="status"></div><div id="content" class="grid"></div><script>
const REPO="fedezam/chocopop-tv";const BRANCH="main";const CATALOG_URL=`https://raw.githubusercontent.com/${REPO}/${BRANCH}/data/tvbox_index.json`;let items=[];
async function load(){document.getElementById('status').textContent='📡 Cargando...';try{const res=await fetch(`${CATALOG_URL}?t=${Date.now()}`);if(!res.ok)throw new Error(`HTTP ${res.status}`);const data=await res.json();items=data.items||[];if(data.updated){const d=new Date(data.updated);document.getElementById('last-update').textContent=`🕐 ${d.toLocaleDateString()} ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;}render(items);document.getElementById('status').textContent=`✅ ${items.length} títulos`;}catch(e){document.getElementById('status').textContent='❌ Error al cargar';}}
function render(list){const g=document.getElementById('content');g.innerHTML='';list.forEach(i=>{const c=document.createElement('div');c.className='card';c.tabIndex=0;c.innerHTML=`<img src="${i.poster||''}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22225%22><rect fill=%22%23333%22 width=%22100%25%22 height=%22100%25%22/></svg>'"><div class="title">${i.title}${i.year?` (${i.year})`:''}</div>`;c.onclick=()=>{if(i.stream)location.href=`player.html?url=${encodeURIComponent(i.stream)}&title=${encodeURIComponent(i.title)}`;};g.appendChild(c);});}
document.getElementById('search').addEventListener('input',e=>{const q=e.target.value.toLowerCase();render(q?items.filter(i=>i.title.toLowerCase().includes(q)):items);});load();
</script></body></html>
